---
name: Dependency Review
on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          allow-licenses: Apache-2.0, BSD-2-Clause, BSD-3-Clause, MIT, LicenseRef-scancode-google-patent-license-golang
